<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Ed-Wise</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>

<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <div class="logo">
                <h2>Ed-Wise<span class="dot">.</span></h2>
            </div>

            <nav class="nav-menu">
            </nav>

            <div class="user-mini-profile">
                <div class="avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-info">
                    <h4 id="userName">User</h4>
                    <span id="userRole">Role</span>
                </div>
                <button id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </aside>

        
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h2 id="pageTitle">Dashboard</h2>
                    <p id="currentDate">Loading date...</p>
                </div>
                <div class="actions">
                    <div class="search-bar">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" placeholder="Search...">
                    </div>
                    <button class="icon-btn"><i class="fa-regular fa-bell"></i><span class="badge">3</span></button>
                    <div class="points-display">
                        <i class="fa-solid fa-gem"></i>
                        <span id="userPoints">0</span> XP
                    </div>
                </div>
            </header>
            <div id="contentArea" class="content-area">
                
            </div>
        </main>
    </div>

   
    <div id="modalContainer"></div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
